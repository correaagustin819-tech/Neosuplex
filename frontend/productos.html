<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Productos - Neosuplex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="imagenes/Logo1.0.png" alt="Neosuplex Logo">
            </a>
            <nav class="nav">
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="productos.html" class="active">Productos</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div id="contenedor-usuario">
                    <a href="login.html" class="btn-login">
                        <i class="fas fa-user"></i> Iniciar Sesión
                    </a>
                </div>

                <a href="carrito.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <section class="catalog-section">
        <div class="container">
            <div class="catalog-header">
                <h2>Nuestros Productos</h2>
                <p>Explora nuestra amplia gama de suplementos deportivos</p>
            </div>

            <div class="filters-bar">
                <div class="search-box" style="position: relative;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="buscador-productos" placeholder="Buscar productos..." autocomplete="off">
                    <div id="caja-sugerencias" class="sugerencias-box" style="display: none;"></div>
                </div>
                <div class="sort-box">
                    <i class="fas fa-sort-amount-down"></i>
                    <select id="ordenar-productos">
                        <option value="destacados">Destacados</option>
                        <option value="menor-mayor">Menor a Mayor Precio</option>
                        <option value="mayor-menor">Mayor a Menor Precio</option>
                    </select>
                </div>
            </div>

            <div class="categories-pills">
                <button class="pill active" data-categoria="Todos">Todos</button>
                <button class="pill" data-categoria="Proteínas">Proteínas</button>
                <button class="pill" data-categoria="Aminoácidos">Aminoácidos</button>
                <button class="pill" data-categoria="Creatina">Creatina</button>
                <button class="pill" data-categoria="Pre-Entrenos">Pre-Entrenos</button>
                <button class="pill" data-categoria="Vitaminas">Vitaminas</button>
                <button class="pill" data-categoria="Grasas Saludables">Grasas Saludables</button>
            </div>

            <p class="results-text" id="contador-productos">Mostrando productos...</p>

            <div class="product-grid" id="contenedor-productos">
                </div>

            <div id="mensaje-sin-stock" style="display: none; text-align: center; margin: 40px 0;">
                <div class="card-footer" style="display: inline-block;">
                    <button class="btn-disabled btn-full btn-icon">
                        <i class="fas fa-shopping-cart"></i> No hay productos disponibles en esta categoría
                    </button>
                </div>
            </div>

            <div id="controles-paginacion" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin: 40px 0; padding-bottom: 40px;">
                <button id="btn-anterior" onclick="cambiarPagina(-1)" class="btn-pag">
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                
                <span id="info-pagina" style="color: white; font-weight: bold; font-size: 16px;">
                    Página 1
                </span>
                
                <button id="btn-siguiente" onclick="cambiarPagina(1)" class="btn-pag next">
                    Siguiente <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>
    
    <div id="modal-producto" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()">
                <i class="fas fa-times"></i>
            </button>
            
            <div class="modal-grid">
                <div class="modal-image-container">
                    <img id="modal-img" src="" alt="Producto">
                </div>
                
                <div class="modal-info">
                    <span id="modal-categoria" class="product-category">Categoría</span>
                    <h2 id="modal-nombre">Nombre del Producto</h2>
                    <p id="modal-precio" class="modal-price">$0.00</p>
                    
                    <div class="modal-stock-status" id="modal-stock-status"></div>

                    <div class="modal-description">
                        <h3>Detalles del suplemento:</h3>
                        <p id="modal-desc">Aquí va la descripción...</p>
                    </div>

                    <div class="modal-actions">
                        <button id="modal-btn-add" class="btn-blue btn-full">
                            <i class="fas fa-shopping-cart"></i> Agregar al Carrito
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* Estilos base para el modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--color-bg-card); width: 90%; max-width: 900px; border-radius: 12px; border: 1px solid var(--color-border); position: relative; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); animation: modalFadeIn 0.3s ease; }
        .modal-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: var(--color-text-dull); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: var(--color-primary); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .modal-image-container img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px; }
        .modal-info h2 { color: white; margin: 10px 0; font-size: 24px; }
        .modal-price { font-size: 32px; color: var(--color-primary); font-weight: bold; margin-bottom: 15px; }
        .modal-stock-status { font-size: 14px; font-weight: bold; margin-bottom: 20px; padding: 5px 10px; border-radius: 4px; display: inline-block; }
        .stock-in { background: rgba(0, 210, 106, 0.2); color: #00d26a; }
        .stock-out { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .modal-description { background: var(--color-bg-input); padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid var(--color-border); }
        .modal-description h3 { font-size: 12px; color: var(--color-text-dull); margin-bottom: 10px; text-transform: uppercase; }
        .modal-description p { color: var(--color-text-light); font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        
        /* Estilos para botones de paginación */
        .btn-pag { padding: 10px 20px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-pag.next { background: var(--color-primary); color: black; font-weight: bold; border: none; }
        .btn-pag:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.2); }
        .btn-pag:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) { .modal-grid { grid-template-columns: 1fr; gap: 20px; } .modal-content { padding: 20px; max-height: 90vh; overflow-y: auto; } }
    </style>

    <script src="main.js"></script>
</body>
</html>
