
services:
  # 1. Tu Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: neosuplex_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tienda_neosuplex
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. Tu Backend en Java
  backend:
    build: ./backend
    container_name: neosuplex_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/tienda_neosuplex?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  # 3. Tu Frontend (Página Web)
  frontend:
    build: ./frontend
    container_name: neosuplex_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: